services:
  - type: web
    name: rawafed-erp-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: RAWAFED_DATA_DIR
        value: /var/data/rawafed
      - key: RAWAFED_UPLOAD_DIR
        value: /var/data/rawafed-uploads
      - key: CORS_ORIGIN
        value: https://rawafed-erp.vercel.app,http://localhost:4200,http://127.0.0.1:4200
    disk:
      name: rawafed-data
      mountPath: /var/data
      sizeGB: 1
