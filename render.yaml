services:
  - type: web
    name: rawafed-erp-backend
    repo: https://github.com/hamdyabdelrhman66-arch/rawafed-erp.git
    branch: main
    autoDeployTrigger: commit
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: PERSISTENCE_DRIVER
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USE_NEON_POOLER
        value: "true"
      - key: DATABASE_CONNECTION_LIMIT
        value: "3"
      - key: DATABASE_POOL_TIMEOUT
        value: "20"
      - key: DATABASE_CONNECT_TIMEOUT
        value: "15"
      - key: BUILD_VERSION
        value: render
      - key: CORS_ORIGIN
        value: https://rawafed-erp.vercel.app,http://localhost:4200,http://127.0.0.1:4200
