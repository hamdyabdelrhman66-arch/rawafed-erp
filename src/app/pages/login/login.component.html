<section class="login-page">
  <aside class="login-identity">
    <div class="hero-logo">
      <img src="/assets/rawafed-logo.png" alt="Rawafed International School" />
    </div>
    <h1>Rawafed International School</h1>
    <p>Admissions, finance, and student operations in one protected portal.</p>
  </aside>

  <article class="login-panel">
    <div class="brand-row">
      <img class="logo" src="/assets/rawafed-logo.png" alt="Rawafed International School" />
      <div>
        <strong>Rawafed International School</strong>
        <small>Admissions and Finance Portal</small>
      </div>
    </div>

    <div class="login-title">
      <h2>Sign in</h2>
      <p>Enter your assigned school account to continue.</p>
    </div>

    <form (ngSubmit)="login()" class="login-form">
      <label>
        <span>Username</span>
        <input name="username" [(ngModel)]="username" autocomplete="username" />
      </label>

      <label>
        <span>Password</span>
        <input name="password" type="password" [(ngModel)]="password" autocomplete="current-password" />
      </label>

      <p class="error" *ngIf="error">{{ error }}</p>

      <button mat-flat-button color="primary" type="submit" [disabled]="isLoggingIn">
        <mat-icon>login</mat-icon>
        {{ isLoggingIn ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <a class="register-button" routerLink="/register">
      <mat-icon>app_registration</mat-icon>
      Student Registration
    </a>
  </article>
</section>
