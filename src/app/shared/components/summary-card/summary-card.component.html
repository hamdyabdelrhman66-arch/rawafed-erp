<article class="summary-card">
  <header>
    <h3>{{ title }}</h3>
    <button *ngIf="editable" mat-icon-button type="button" [attr.aria-label]="'Edit ' + title">
      <mat-icon>edit</mat-icon>
    </button>
  </header>
  <dl>
    <ng-container *ngFor="let row of rows">
      <dt>{{ row[0] }}</dt>
      <dd>{{ row[1] || '-' }}</dd>
    </ng-container>
  </dl>
</article>
