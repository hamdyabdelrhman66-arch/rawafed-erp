services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rawafed
      POSTGRES_USER: rawafed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rawafed -d rawafed"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://rawafed:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/rawafed
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET:?Set REFRESH_SECRET}
      CORS_ORIGIN: http://localhost:4200
    ports:
      - "4300:4300"
    command: ["sh", "-c", "npm run db:migrate && node dist/server.js"]
volumes:
  postgres-data:
